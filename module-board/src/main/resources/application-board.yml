# ============================================
# module-board 전용 DataSource 설정
# 별도 DB (company_board) 연결
# ============================================

spring:
  datasource:
    board:
      url: jdbc:mariadb://localhost:3306/company_board
      username: root
      password: root
      driver-class-name: org.mariadb.jdbc.Driver
      hikari:
        pool-name: BoardHikariPool
        maximum-pool-size: 5
        minimum-idle: 2
        idle-timeout: 30000
        connection-timeout: 20000
